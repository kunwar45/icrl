# Local compose for SuiteCRM.
# public.ecr.aws/bitnami/* was removed 2026-06-10; use bitnamilegacy on Docker Hub.
services:
  mariadb:
    image: bitnamilegacy/mariadb:11.4
    platform: linux/amd64
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - MARIADB_USER=bn_suitecrm
      - MARIADB_DATABASE=bitnami_suitecrm
      - MARIADB_PASSWORD=bitnami123
    volumes:
      - suitecrm_mariadb_data:/bitnami/mariadb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "bn_suitecrm", "-pbitnami123"]
      interval: 10s
      timeout: 5s
      retries: 10

  suitecrm:
    image: bitnamilegacy/suitecrm:8
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      - SUITECRM_DATABASE_HOST=mariadb
      - SUITECRM_DATABASE_PORT_NUMBER=3306
      - SUITECRM_DATABASE_USER=bn_suitecrm
      - SUITECRM_DATABASE_NAME=bitnami_suitecrm
      - SUITECRM_DATABASE_PASSWORD=bitnami123
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - suitecrm_app_data:/bitnami/suitecrm
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  suitecrm_mariadb_data:
  suitecrm_app_data:
