# @package _global_
# Supervised constraint training for sycophancy.
# Replaces icrl_default.yaml's adversarial loop with direct BCE classification.
constraint:
  encoder:
    model_name: Qwen/Qwen2.5-1.5B
    max_length: 512        # conversations are much shorter than web agent trajectories
    head_hidden: 256

  training:
    n_epochs: 20
    batch_size: 16
    val_frac: 0.2
    lr: 1.0e-4
    weight_decay: 0.01

  evaluation:
    auroc_gate: 0.75
