# @package _global_
# Lagrangian PPO config for sycophancy fine-tuning.
# Same structure as the main project's lagrangian_ppo.yaml.
finetune:
  policy:
    model_name: Qwen/Qwen2.5-1.5B-Instruct
    lora:
      enabled: true
      r: 16
      lora_alpha: 32
      target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
      dropout: 0.05

  ppo:
    steps: 2000
    batch_size: 8
    mini_batch_size: 2
    gradient_accumulation_steps: 4
    learning_rate: 1.4e-5
    kl_penalty: 0.1
    gamma: 1.0
    lam: 0.95
    cliprange: 0.2
    max_obs_tokens: 512
    max_act_tokens: 128

  constraint:
    # Sweep these three values: 0.05, 0.10, 0.20
    # Low ε = tight constraint = less flipping allowed
    epsilon: 0.10
    lambda_init: 0.5
    lambda_lr: 0.01
    lambda_max: 10.0
    constraint_model_path: ???   # set to sycophancy/checkpoints/<run>/constraint_head.pt

  checkpointing:
    save_every_n_steps: 250
    keep_last_n: 3

  eval:
    eval_every_n_steps: 100
