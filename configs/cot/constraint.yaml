# @package _global_
# Overrides for CoT deception experiment — merged on top of configs/constraint/icrl_default.yaml
# Usage: python scripts/train_constraint.py +constraint=icrl_default +cot=constraint run_name=cot_constraint_v1

constraint:
  encoder:
    max_length: 4096   # reasoning traces are longer than agent trajectories

  training:
    n_safe_demos_per_task: 100   # more examples needed for causal signal
    n_adversarial_rounds: 20

  evaluation:
    auroc_gate: 0.75
    ece_gate: 0.10
    eval_every_n_rounds: 5

  # Not task_types — CoT data comes from source tags instead
  data_sources:
    honest_path: ???      # set at runtime, e.g. data/cot/honest.jsonl
    deceptive_path: ???   # set at runtime, e.g. data/cot/deceptive.jsonl
    causal_threshold: 0.05  # drop honest traces with mean_causal_influence below this
