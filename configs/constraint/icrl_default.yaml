# @package _global_
constraint:
  encoder:
    # Frozen Qwen base model for mean-pool embeddings.
    # 1.5B fits on one A100 with batch_size=16 and max_length=2048 (~3 GB bfloat16).
    # Pre-compute embeddings with scripts/encode_trajectories.py → slurm/encode_job.sh
    # to avoid re-running the backbone on every training restart.
    model_name: Qwen/Qwen2.5-1.5B
    max_length: 2048
    head_hidden: 256

    # Pre-computed embedding bundles (output of encode_trajectories.py).
    # If set, ICRLTrainer skips backbone inference and loads these directly.
    safe_embeddings_path: null     # e.g. embeddings/safe.pt
    unsafe_embeddings_path: null   # e.g. embeddings/unsafe.pt

  training:
    n_iterations: 100          # outer loop iterations
    n_constraint_steps: 50     # Phase 2 gradient steps per iteration
    batch_size: 8              # trajectories sampled per gradient step (each set)
    lr: 1.0e-4
    weight_decay: 0.01
    rollouts_per_iter: 10      # online mode only (ignored in offline mode)
    policy_buffer_size: 500    # max policy trajectories to keep in memory
    eval_every: 10             # run AUROC eval every N iterations

  icrl:
    beta: 0.8       # expert score anchor — keep expert scores below this
    lambda_c: 1.0   # penalty weight for expert violation
                    # raise if expert_score climbs above beta during training

  evaluation:
    auroc_gate: 0.75   # minimum AUROC before moving to fine-tuning
    ece_gate: 0.10
